    .container {

      backdrop-filter: blur(10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .page-name {

      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.02em;
      word-break: keep-all;
    }

    h1 {

      font-size: 24px;
      font-weight: 700;
      word-break: keep-all;
    }

    p {
      margin: 0 0 24px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 15px;
      line-height: 1.6;
      word-break: keep-all;
    }

    .button-list {
      display: grid;
      gap: 12px;
    }

    .lang-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: #ffffff;
      color: #111827;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .lang-btn:hover {
      transform: translateY(-2px);
      background: #f3f4f6;
    }

    .lang-btn:active {
      transform: translateY(0);
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .container {
        padding: 28px 18px;
      }

      .page-name {
        font-size: 26px;
      }

      h1 {
        font-size: 22px;
      }

      .lang-btn {
        font-size: 15px;
        padding: 14px 16px;
      }

    const TYPE_ALIASES = {
      carnival: 'carnival-shooting'
    };

    const TEXT_MAP = {
      ko: {
        heading: '언어를 선택해 주세요',
        description: '원하시는 언어 버튼을 누르면 해당 페이지로 이동합니다.'
      },
      en: {
        heading: 'Please select a language',
        description: 'Click your preferred language button to go to the corresponding page.'
      },
      ja: {
        heading: '言語を選択してください',
        description: 'ご希望の言語ボタンを押すと、該当ページへ移動します。'
      },
      zhHant: {
        heading: '請選擇語言',
        description: '點擊您想要的語言按鈕，即可前往對應頁面。'
      },
      zhHans: {
        heading: '请选择语言',
        description: '点击您想要的语言按钮，即可前往对应页面。'
      }
    };

    function normalizeLang(lang) {
      if (!lang) {
        return null;
      }

      const value = String(lang).toLowerCase();

      if (value.startsWith('ko')) return 'ko';
      if (value.startsWith('en')) return 'en';
      if (value.startsWith('ja')) return 'ja';
      if (value.startsWith('zh-tw') || value.startsWith('zh-hk') || value.startsWith('zh-mo') || value.includes('hant')) return 'zhHant';
      if (value.startsWith('zh-cn') || value.startsWith('zh-sg') || value.includes('hans') || value.startsWith('zh')) return 'zhHans';

      return null;
    }

    function getTypeFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const rawType = params.get('type') || 'tagada';
      const resolvedType = TYPE_ALIASES[rawType] || rawType;
      return ROUTES[resolvedType] ? resolvedType : 'tagada';
    }

    function getLangFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const forcedLang = normalizeLang(params.get('lang'));
      if (forcedLang) {
        return forcedLang;
      }
      return normalizeLang(navigator.language) || 'ko';
    }

    const currentType = getTypeFromQuery();
    const currentLang = getLangFromQuery();
    const currentRoute = ROUTES[currentType];
    const currentText = TEXT_MAP[currentLang] || TEXT_MAP.ko;
    const localizedPageName = currentRoute.names[currentLang] || currentRoute.names.ko;

    document.title = localizedPageName;
    document.documentElement.lang = currentLang === 'zhHant'
      ? 'zh-Hant'
      : currentLang === 'zhHans'
      ? 'zh-Hans'
      : currentLang;
    document.getElementById('pageName').textContent = localizedPageName;
    document.getElementById('mainTitle').textContent = currentText.heading;
    document.getElementById('mainDescription').textContent = currentText.description;

    document.querySelectorAll('.lang-btn').forEach((button) => {
      button.addEventListener('click', () => {
        const langKey = button.dataset.lang;
        const target = currentRoute.links[langKey];
        if (target) {
          window.location.href = target;
        }
      });
    });
